<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Espace équipe — Munda Kfé</title>
  <link rel="icon" href="../images/flamingo-icon.png">
  <!-- Netlify Identity : gère la connexion par email + mot de passe -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <!-- Decap CMS (anciennement Netlify CMS) : interface graphique d'édition -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", (user) => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/patrons/";
          });
        }
      });
    }
  </script>
</body>
</html>
